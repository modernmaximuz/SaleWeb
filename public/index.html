<!DOCTYPE html>
<html>
<head>
    <title>Paste Editor</title>
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="navbar.css">
<link rel="stylesheet" href="/tabs/dashboard.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div id="topbar">
    <a href="/">
        <img src="/images/logo.png" class="logo">
    </a>

    <!-- CENTER NAVIGATION -->
    <div id="navCenter">
        <button class="navBtn" onclick="requireLogin(event, '/restocks', this)">Restocks</button>

        <div class="dropdown">
    <button class="navBtn" id="shopToggle">Shop &#9662;</button>
    <div class="dropdownContent" id="shopMenu">
                <a href="/shop/adoptme" onclick="requireLogin(event, '/shop/adoptme', this)">Adopt Me</a>
                <a href="/shop/mm2" onclick="requireLogin(event, '/shop/mm2', this)">Murder Mystery</a>
            </div>
        </div>

        <button class="navBtn" onclick="requireLogin(event, '/tabs/proofs', this)">Proofs</button>
        <button class="navBtn" onclick="requireLogin(event, '/support', this)">Support</button>
        <button class="navBtn" onclick="requireLogin(event, '/tabs/orders', this)">Orders</button>
    </div>

    <div id="navRight">
        <button id="loginToggle" onclick="if(typeof window.openLoginModal === 'function') window.openLoginModal()">Login</button>
<div id="cartIcon">
    <img src="/images/cart.png" id="cartImg">
    <span id="cartCount">0</span>
</div>
        <div id="cartPopup" class="hidden">
    <div id="cartBox">
        <h2>Your Cart</h2>
        <div id="cartItems"></div>

        <div id="cartTotal">Total: ₱0</div>

        <button id="finalizeOrder">Finalize Order</button>
    </div>
</div>
<script src="/cart.js"></script>
        <div id="profileBox" class="hidden">
            <div id="profileMain">
                <div class="avatar"></div>
                <span id="profileName">User</span>
            </div>
            <div id="profileDropdown" class="hidden">
                <button id="logoutBtn">Logout</button>
            </div>
        </div>
    </div>
</div>

<!-- Dashboard Content -->
<div class="dashboard-container">
    <div class="stats-grid">
        <!-- HITS_COUNT - Success Count -->
        <div class="stat-card">
            <div class="stat-icon success">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="stat-content">
                <div class="stat-label">Success Count</div>
                <div class="stat-value" id="successCount">0</div>
                <div class="stat-description">Total Success</div>
            </div>
        </div>

        <!-- ACTIVE_USERS - Discord Members -->
        <div class="stat-card">
            <div class="stat-icon primary">
                <i class="fas fa-users"></i>
            </div>
            <div class="stat-content">
                <div class="stat-label">Discord Members</div>
                <div class="stat-value" id="discordMembers">0</div>
                <div class="stat-description">Total members</div>
            </div>
        </div>

        <!-- TOTAL_VALUE - Total Restocks -->
        <div class="stat-card">
            <div class="stat-icon warning">
                <i class="fas fa-boxes"></i>
            </div>
            <div class="stat-content">
                <div class="stat-label">Total Restocks</div>
                <div class="stat-value" id="totalRestocks">0</div>
                <div class="stat-description">Overall restocks of all items</div>
            </div>
        </div>
    </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner">
        <div class="spinner"></div>
        <p>Loading dashboard data...</p>
    </div>
</div>

<!-- Profile Configuration Modal -->
<div id="profileConfigModal" class="hidden">
    <div id="profileConfigModalBox">
        <div class="modalHeader">
            <h3>Configure Profile</h3>
            <button class="closeModal" onclick="closeProfileConfigModal()">×</button>
        </div>
        <div class="modalContent">
            <div class="form-group">
                <label for="displayName">Display Name:</label>
                <input type="text" id="displayName" placeholder="Enter your display name">
            </div>
            <div class="form-group">
                <label for="avatarUpload">Profile Picture:</label>
                <div class="upload-container">
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                    <button type="button" id="uploadBtn" class="upload-button">Choose Image</button>
                    <div class="upload-options">
                        <span>or</span>
                        <input type="text" id="avatarUrl" placeholder="Enter image URL">
                    </div>
                </div>
                <div id="avatarPreview">
                    <img id="avatarPreviewImg" src="/images/default-avatar.png" alt="Avatar Preview">
                    <div id="uploadProgress" class="hidden">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <span class="progress-text">Uploading...</span>
                    </div>
                </div>
            </div>
            <div class="modalButtons">
                <button class="cancelBtn" onclick="closeProfileConfigModal()">Cancel</button>
                <button class="submitBtn" onclick="saveProfile()">Save Profile</button>
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="navbar.css">
<script src="navbar.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>
<script src="script.js"></script>
<script src="/cart.js"></script>
<script src="/tabs/dashboard.js"></script>
</body>
</html>
