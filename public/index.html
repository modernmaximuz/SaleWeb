<!DOCTYPE html>
<html>
<head>
    <title>Paste Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="topbar">
    <a href="/">
    <img src="/images/logo.png" style="height:28px;">
</a>

    <div id="navRight">
        <button id="discordBtn" onclick="window.location='/auth/discord'">Discord</button>
        <button id="loginToggle">Login</button>

        <div id="profileBox" class="hidden">
            <div id="profileMain">
                <div class="avatar"></div>
                <span id="profileName">User</span>
            </div>
            <div id="profileDropdown" class="hidden">
                <button id="logoutBtn">Logout</button>
            </div>
        </div>
    </div>
</div>
    <div id="loginBox" style="display:none;">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p id="error"></p>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>
<script src="script.js"></script>
<script src="script.js"></script>
</body>
</html>
