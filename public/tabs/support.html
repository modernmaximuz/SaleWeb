<!DOCTYPE html>
<html>
<head>
    <title>Public Support Chat</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/navbar.css">
    <link rel="stylesheet" href="/tabs/support.css">
</head>
<body>

<div id="topbar">
    <a href="/">
        <img src="/images/logo.png" class="logo">
    </a>
    
<div id="navCenter">
    <button class="navBtn">Restocks</button>

    <div class="dropdown">
        <button class="navBtn" id="shopToggle">Shop &#9662;</button>
        <div class="dropdownContent" id="shopMenu">
            <a href="/shop/adoptme">Adopt Me</a>
            <a href="/shop/mm2">Murder Mystery</a>
        </div>
    </div>

    <button class="navBtn">Proofs</button>
    <button class="navBtn" class="active">Support</button>
    <button class="navBtn" onclick="location.href='/tabs/orders'">Orders</button>
</div>

<div id="navRight">
    <button id="loginToggle">Login</button>
<div id="cartIcon">
    <img src="/images/cart.png" id="cartImg">
    <span id="cartCount">0</span>
</div>
<div id="cartPopup" class="hidden">
    <div id="cartBox">
        <h2>Your Cart</h2>
        <div id="cartItems"></div>

        <div id="cartTotal">Total: &#8369;0</div>

        <button id="finalizeOrder">Finalize Order</button>
    </div>
</div>
    <div id="profileBox" class="hidden">
        <div id="profileMain">
            <div class="avatar"></div>
            <span id="profileName">User</span>
        </div>
        <div id="profileDropdown" class="hidden">
            <button id="logoutBtn">Logout</button>
        </div>
    </div>
</div>

</div>

<div id="chatContainer">
    <div id="chatHeader">
        <h1>Public Support Chat</h1>
        <div id="chatStatus">
            <span id="statusIndicator" class="status-online"></span>
            <span id="statusText">Connected</span>
        </div>
        <div id="resetTimer">Loading reset time...</div>
    </div>
    
    <div id="chatMessages">
        <div id="messagesContainer"></div>
        <div id="typingIndicator" class="hidden">
            <span class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </span>
            <span id="typingText">Someone is typing...</span>
        </div>
    </div>
    
    <div id="chatInput">
        <div id="replyPreview" class="hidden">
            <div class="replyContent">
                <span class="replyLabel">Replying to</span>
                <span class="replyUser"></span>
                <span class="replyMessage"></span>
            </div>
            <button class="cancelReply" onclick="cancelReply()">×</button>
        </div>
        <div class="inputContainer">
            <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
            <button id="sendMessage" disabled>Send</button>
        </div>
    </div>
</div>

<!-- User Actions Modal -->
<div id="userActionsModal" class="hidden">
    <div id="userActionsModalBox">
        <div class="modalHeader">
            <h3 id="modalUserTitle">User Actions</h3>
            <button class="closeModal" onclick="closeUserActionsModal()">×</button>
        </div>
        <div class="modalContent">
            <div class="userInfo">
                <img id="modalUserAvatar" src="" alt="User">
                <div class="userDetails">
                    <span id="modalUserName"></span>
                    <span id="modalUserStatus"></span>
                </div>
            </div>
            <div class="modalActions">
                <button class="actionBtn muteBtn" onclick="muteUser()">Mute User</button>
                <button class="actionBtn unmuteBtn hidden" onclick="unmuteUser()">Unmute User</button>
                <button class="actionBtn deleteBtn" onclick="deleteUserMessages()">Delete Messages</button>
            </div>
        </div>
    </div>
</div>

<!-- Message Delete Confirmation -->
<div id="deleteConfirmModal" class="hidden">
    <div id="deleteConfirmModalBox">
        <h3>Delete Message</h3>
        <p>Are you sure you want to delete this message?</p>
        <div class="modalButtons">
            <button class="cancelBtn" onclick="closeDeleteConfirmModal()">Cancel</button>
            <button class="deleteBtn" onclick="confirmDeleteMessage()">Delete</button>
        </div>
    </div>
</div>

<!-- Profile Configuration Modal -->
<div id="profileConfigModal" class="hidden">
    <div id="profileConfigModalBox">
        <div class="modalHeader">
            <h3>Configure Profile</h3>
            <button class="closeModal" onclick="closeProfileConfigModal()">×</button>
        </div>
        <div class="modalContent">
            <div class="form-group">
                <label for="displayName">Display Name:</label>
                <input type="text" id="displayName" placeholder="Enter your display name">
            </div>
            <div class="form-group">
                <label for="avatarUpload">Profile Picture:</label>
                <div class="upload-container">
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                    <button type="button" id="uploadBtn" class="upload-button">Choose Image</button>
                    <div class="upload-options">
                        <span>or</span>
                        <input type="text" id="avatarUrl" placeholder="Enter image URL">
                    </div>
                </div>
                <div id="avatarPreview">
                    <img id="avatarPreviewImg" src="/images/default-avatar.png" alt="Avatar Preview">
                    <div id="uploadProgress" class="hidden">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <span class="progress-text">Uploading...</span>
                    </div>
                </div>
            </div>
            <div class="modalButtons">
                <button class="cancelBtn" onclick="closeProfileConfigModal()">Cancel</button>
                <button class="submitBtn" onclick="saveProfile()">Save Profile</button>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="/firebase.js"></script>
<script src="/script.js"></script>
<script src="/navbar.js"></script>
<script src="/cart.js"></script>
<script src="/tabs/support.js"></script>
</body>
</html>
