<!DOCTYPE html>
<html>
<head>
    <title>MM2 Shop</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<h1>MM2 Stocks</h1>
<div id="items"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="/firebase.js"></script>

<script>
let token = null;
let canEdit = false;
let pasteData = null;

// Detect who is logged in
async function detectUser() {
    const discord = await fetch("/me").then(r => r.json());

    if (discord) {
        canEdit = false;
        load();
        return;
    }

    firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
            token = await user.getIdToken();
            canEdit = true;
        }
        load();
    });
}

async function load() {
    const res = await fetch("/load", {
        headers: token ? { Authorization: `Bearer ${token}` } : {}
    });

    pasteData = await res.json();
    render();
}

function render() {
    const container = document.getElementById("items");
    container.innerHTML = "";

    pasteData.mm2.items.forEach((item, i) => {
        const div = document.createElement("div");
        div.style.marginBottom = "12px";

        div.innerHTML = `
            <b>${item.name}</b> — Stock: ${item.stock}
            ${canEdit ? `
                <button onclick="change(${i}, 1)">+</button>
                <button onclick="change(${i}, -1)">−</button>
            ` : ""}
        `;

        container.appendChild(div);
    });
}

async function change(index, amount) {
    pasteData.mm2.items[index].stock += amount;
    if (pasteData.mm2.items[index].stock < 0)
        pasteData.mm2.items[index].stock = 0;

    render();

    await fetch("/save", {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({
            content: JSON.stringify(pasteData, null, 2)
        })
    });
}

detectUser();
</script>
</body>
</html>
