<!DOCTYPE html>
<html>
<head>
    <title>MM2 Stock</title>
</head>
<body>

<h1>MM2 Stock</h1>
<div id="stock"></div>

<script>
async function loadStock() {
    const res = await fetch("/load");
    const data = await res.json();

    const json = JSON.parse(data.content || data.paste?.content || "{}");
    const mm2 = json.mm2 || {};

    const container = document.getElementById("stock");
    container.innerHTML = "";

    for (let item in mm2) {
        const div = document.createElement("div");
        div.textContent = item + ": " + mm2[item];
        container.appendChild(div);
    }
}

loadStock();
setInterval(loadStock, 3000);
</script>

</body>
</html>
